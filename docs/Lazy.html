
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FramDoc</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 700px;
            margin: 40px auto;
            line-height: 1.6;
        }
    </style>
    <script>
    const input = document.getElementById('search');
    input.addEventListener('input', () => {
      const q = input.value.toLowerCase();
      const results = SEARCH_DATA.filter(e =>
        e.name.toLowerCase().includes(q) ||
        e.doc.toLowerCase().includes(q)
      );
      document.getElementById('results').innerHTML =
        results.map(e =>
          `<li><a href="${e.url}">${e.module}.${e.name}</a> — ${e.doc.slice(0,80)}…</li>`
        ).join('');
    });
    </script>
</head>

<body>
    <h1><a href="index.html">Dokumentacja</a></h1>
    <h2><a href="search.html">Wyszukiwarka</a></h2>

<h2>Lazy</h2><section id="lazy">
               <h3><code>val lazy</code> <span class="line">line 39</span></h3>
               <p>Creates new suspension from a given computation.</p>
             </section>
<section id="pureLazy">
               <h3><code>val pureLazy</code> <span class="line">line 46</span></h3>
               <p>Creates a lazy value containing a fully evaluated result.
  This is equivalent to constructing an immutable value directly,
  so this function is pure.</p>
             </section>

</body>
</html>
